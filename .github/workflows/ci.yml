# OpenClaw CI/CD Pipeline
# Place this file at: .github/workflows/ci.yml in the fahim0408/clawdbot repo
#
# Required GitHub Actions secrets (set in repo Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID      – IAM user key with bedrock:InvokeModel permission
#   AWS_SECRET_ACCESS_KEY  – Matching secret

name: OpenClaw CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  AWS_DEFAULT_REGION: us-east-1
  BEDROCK_MODEL: us.anthropic.claude-sonnet-4-5-20250929-v1:0

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --exclude=.git,__pycache__,venv,.venv,dist,build \
            --statistics

  # ── 2. Type-check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps + mypy
        run: |
          pip install mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run mypy
        run: mypy . --ignore-missing-imports --exclude venv --exclude build

  # ── 3. Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run pytest
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            -x

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── 4. AI Code Review (3 parallel reviewers) ─────────────────────────────────
  ai-review-security:
    name: "AI Review: Security"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need HEAD~1 for diff

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_DEFAULT_REGION }}

      - name: Security review
        run: python .github/scripts/ai_review.py security

  ai-review-performance:
    name: "AI Review: Performance"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_DEFAULT_REGION }}

      - name: Performance review
        run: python .github/scripts/ai_review.py performance

  ai-review-best-practices:
    name: "AI Review: Best Practices"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: success()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_DEFAULT_REGION }}

      - name: Best practices review
        run: python .github/scripts/ai_review.py best-practices
